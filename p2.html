<!DOCTYPE html>
<html lang="en">
    <head>
        <title>newsweek.com clone page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="CSS/style.css" rel="stylesheet">
        <link href="CSS/mini.css" rel="stylesheet">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
        <script src="https://kit.fontawesome.com/cbdf2b0f0e.js" crossorigin="anonymous"></script>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700;900&display=swap" rel="stylesheet">
    </head>
    <body>
    <header class="bg-small roboto p-4">
        <div class="d-flex flex-column background justify-content-around">
            <div class="d-flex flex-row justify-content-around align-content-center flex-wrap mb-2">
                <div class="d-flex flex-column"><a href="../index.html"><i class="fas fa-home icon-text"></i></a></div>
                <div class="d-flex flex-column"><a href="#portfolio"><i class="far fa-folder-open icon-text"></i></a></div>
                <div class="d-flex flex-column"><a href="#about"><i class="far fa-address-card icon-text"></i></a></div>
            </div>
            <div class="contact d-flex flex-row justify-content-around mt-2">
                <div class="email col-sm-2 icon-text mt-4"><i class="fas fa-mail-bulk"></i></div>
                <div class="github col-sm-2 icon-text mt-4"><i class="fab fa-github"></i></div>
                <div class="linkedin col-sm-2 icon-text mt-4"><i class="fab fa-linkedin"></i></div>
                <div class="twitter col-sm-2 icon-text mt-4"><i class="fab fa-twitter-square"></i></div>
            </div>
        </div>
    </header>
        <div class="cont">
            <div class="d-flex flex-column">
                <img src="IMG/p2/Website.png" class="img-big" alt="Project Thumbnail">
                <div class="flex-row justify-content-around mt-2 ml-auto mr-auto">
                    <img src="IMG/p2/tablet.png" class="img-medium p-1" alt="Tablet view">
                    <img src="IMG/p2/mobile.png" class="img-medium p-1" alt="Mobile view">
                </div>
            </div>
            <div class="mt-2 mb-2 d-flex flex-row row justify-content-center">
                <div class="">
                    <a href="https://github.com/SunnySparks/newsweek.com" class="btn btn-primary m-2 ">
                        <div class="row">
                            <div class="col-8 mini-icon-text pt-2">See source</div>
                            <div class="col-4 icon-text pb-1"><i class="fab fa-github "></i></div>
                        </div>
                    </a>
                </div>
                <div class="">
                    <a href="https://rawcdn.githack.com/SunnySparks/newsweek.com/a22f7e2725ef2c117f943d3ab8b3c456492e5633/index.html" class="btn btn-primary m-2 ">
                        <div class="row">
                            <div class="col-6 mini-icon-text pt-2">See live</div>
                            <div class="col-6 icon-text pb-1"><i class="fas fa-desktop"></i></div>
                        </div>
                    </a>
                </div>
            </div>
            <div class="card-body p-2 text-center mb-1">
                <h3 class="card-title">newsweek.com clone page</h3>
                <div class="d-flex flex-row justify-content-around mb-4 mt-4">
                    <div class="card-button"><p class="card-text text-light gray-bg p-1">HTML</p></div>
                    <div class="card-button"><p class="card-text text-light gray-bg p-1">CSS</p></div>
                    <div class="card-button"><p class="card-text text-light gray-bg p-1">Bootstrap</p></div>
                </div>
                <p>The purpose of making this clone website is to prove my knowledge on the use of the Bootstrap framework. This is a simple responsive website adjusted to mobile, tablet and desktop view.</p>
            </div>
    </div>

    </body>
</html>
