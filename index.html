<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/cbdf2b0f0e.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <header class="bg roboto">
        <div class="d-flex flex-column background justify-content-around">
            <div class="d-flex flex-row justify-content-around align-content-center flex-wrap">
                <div class="d-flex flex-column text-white">Flex item 1</div>
                <div class="d-flex flex-column"><a href="#portfolio">Porfolio</a></div>
                <div class="d-flex flex-column"><a href="#about">About</a></div>
                <div class="d-flex flex-column"><a href="#contact">Contact</a></div>
            </div>
            <div class="title text-center">
                <h1 class="mb-5">Welcome to my portfolio</h1>
                <p class="mb-5 mt-3">Nice to meet you! My name is José Silva, I am a web developer and I can help you create an amazing website, get in contact with me!</p>
            </div>
            <div class="contact d-flex flex-row justify-content-around">
                <div class="email col-sm-2"><i class="fas fa-mail-bulk"></i></div>
                <div class="github col-sm-2"><i class="fab fa-github"></i></div>
                <div class="linkedin col-sm-2"><i class="fab fa-linkedin"></i></div>
                <div class="twitter col-sm-2"><i class="fab fa-twitter-square"></i></div>
            </div>
        </div>
    </header>
    <a id="portfolio">
    <div class="portfolio col-lg-12">
        <div class="bg-info col-lg-12 background"></div>
    </div>
    </a>
    <a id="about">
    <div class="about col-lg-12">
        <div class="bg-warning col-lg-12 background"></div>
    </div>
    </a>
    <a id="contact">
    <div class="contact col-lg-12">
        <div class="bg-danger col-lg-12 background"></div>
    </div>
    </a>
</body>
</html>
